<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wonderloka - Detail Destinasi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <style>
        /* ---------- RESET ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #e3f2fd;
            color: #1a1a1a;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ---------- NAVBAR ---------- */
        .navbar {
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(13, 71, 161, 0.08);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            color: #0d47a1;
        }

        .nav-brand i {
            font-size: 28px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 32px;
            font-weight: 500;
            font-size: 15px;
        }

        .nav-menu a {
            color: #555;
            transition: color 0.3s;
            padding: 6px 0;
            border-bottom: 3px solid transparent;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: #0d47a1;
            border-bottom-color: #0d47a1;
        }

        /* ---------- PROFILE DROPDOWN ---------- */
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
        }

        .profile-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 28px;
            color: #555;
            transition: color 0.3s;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-btn:hover {
            color: #0d47a1;
        }

        .profile-dropdown {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(13, 71, 161, 0.12);
            min-width: 180px;
            overflow: hidden;
            z-index: 200;
        }

        .profile-dropdown.active {
            display: block;
        }

        .profile-dropdown a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            font-size: 14px;
            color: #333;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .profile-dropdown a:last-child {
            border-bottom: none;
        }

        .profile-dropdown a:hover {
            background: #e3f2fd;
        }

        .profile-dropdown a i {
            width: 20px;
            color: #0d47a1;
        }

        .profile-dropdown .logout-item {
            color: #d32f2f;
        }
        .profile-dropdown .logout-item i {
            color: #d32f2f;
        }

        .nav-toggle {
            display: none;
            font-size: 24px;
            color: #333;
            cursor: pointer;
        }

        /* ---------- DETAIL CONTAINER ---------- */
        .detail-container {
            max-width: 1200px;
            margin: 32px auto 0;
            padding: 0 20px 60px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
        }

        .detail-left .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #0d47a1;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .detail-left .back-link:hover {
            text-decoration: underline;
        }

        .detail-left .destinasi-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .detail-left .destinasi-location {
            font-size: 16px;
            color: #555;
            margin-top: 4px;
        }

        .detail-left .destinasi-location i {
            color: #0d47a1;
            margin-right: 4px;
        }

        .detail-left .destinasi-rating {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff3e0;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #e65100;
            margin-top: 8px;
        }

        .btn-favorit-detail {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 1.5px solid #e0e0e0;
            border-radius: 30px;
            padding: 8px 18px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #777;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            margin-left: 8px;
        }

        .btn-favorit-detail:hover {
            border-color: #e53935;
            color: #e53935;
            background: #ffebee;
        }

        .btn-favorit-detail.active {
            border-color: #e53935;
            color: #e53935;
            background: #ffebee;
        }

        .btn-favorit-detail.active i {
            color: #e53935;
        }

        .btn-favorit-detail i {
            font-size: 16px;
            transition: transform 0.3s;
        }

        .btn-favorit-detail:hover i {
            transform: scale(1.2);
        }

        .detail-left .destinasi-image {
            margin-top: 16px;
            border-radius: 16px;
            overflow: hidden;
            height: 280px;
        }

        .detail-left .destinasi-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-left .destinasi-description {
            margin-top: 20px;
        }

        .detail-left .destinasi-description h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .detail-left .destinasi-description p {
            font-size: 15px;
            line-height: 1.8;
            color: #444;
        }

        .fasilitas {
            margin-top: 24px;
        }

        .fasilitas h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .fasilitas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .fasilitas-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #333;
        }

        .fasilitas-item i {
            color: #0d47a1;
            font-size: 18px;
        }

        /* ---------- ORDER CARD ---------- */
        .order-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 28px 24px;
            box-shadow: 0 4px 20px rgba(13, 71, 161, 0.08);
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .order-card .price {
            font-size: 28px;
            font-weight: 700;
            color: #0d47a1;
        }

        .order-card .price span {
            font-size: 16px;
            font-weight: 400;
            color: #777;
        }

        .order-card .divider {
            border: none;
            border-top: 1.5px solid #bbdefb;
            margin: 20px 0;
        }

        .order-card .form-group {
            margin-bottom: 18px;
        }

        .order-card .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }

        .order-card .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
            background: #fafafa;
        }

        .order-card .form-group input:focus {
            outline: none;
            border-color: #0d47a1;
            box-shadow: 0 0 0 4px rgba(13, 71, 161, 0.1);
        }

        .order-card .form-group input[type="number"] {
            -moz-appearance: textfield;
        }
        .order-card .form-group input[type="number"]::-webkit-outer-spin-button,
        .order-card .form-group input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Ticket Counter */
        .ticket-counter {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .ticket-counter input {
            width: 80px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            padding: 12px;
        }
        .counter-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #0d47a1;
            background: #fff;
            color: #0d47a1;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .counter-btn:hover {
            background: #0d47a1;
            color: #fff;
        }
        .counter-btn:active {
            transform: scale(0.95);
        }
        .counter-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .order-card .total-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-top: 2px solid #bbdefb;
            margin-top: 4px;
        }

        .order-card .total-section .label {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .order-card .total-section .amount {
            font-size: 24px;
            font-weight: 700;
            color: #0d47a1;
        }

        .btn-payment {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0d47a1, #1565c0);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 6px 20px rgba(13, 71, 161, 0.25);
            margin-top: 8px;
        }

        .btn-payment:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(13, 71, 161, 0.35);
        }

        .btn-payment:active {
            transform: scale(0.98);
        }

        /* ---------- FOOTER ---------- */
        .footer {
            text-align: center;
            padding: 24px 20px;
            font-size: 14px;
            color: #777;
            border-top: 1px solid #bbdefb;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 992px) {
            .detail-container {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .order-card {
                position: relative;
                top: 0;
            }
            .fasilitas-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
                flex-direction: column;
                background: #fff;
                position: absolute;
                top: 70px;
                left: 0;
                right: 0;
                padding: 20px 24px;
                gap: 16px;
                box-shadow: 0 8px 20px rgba(13, 71, 161, 0.08);
            }
            .nav-menu.active {
                display: flex;
            }
            .nav-toggle {
                display: block;
            }
            .nav-actions {
                display: flex;
            }

            .detail-left .destinasi-title {
                font-size: 26px;
            }
            .detail-left .destinasi-image {
                height: 200px;
            }
            .fasilitas-grid {
                grid-template-columns: 1fr;
            }
            .order-card .price {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .detail-left .destinasi-title {
                font-size: 22px;
            }
            .detail-left .destinasi-image {
                height: 170px;
            }
            .order-card {
                padding: 20px 16px;
            }
            .order-card .total-section .amount {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-globe-asia"></i>
                <span>Wonderloka.</span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="dashboard.html">Beranda</a></li>
                <li><a href="pesanan-saya.html">Pesanan saya</a></li>
                <li><a href="favorit.html">Favorit</a></li>
            </ul>
            <div class="nav-actions">
                <button class="profile-btn" id="profileBtn" aria-label="Profile">
                    <i class="fas fa-user-circle"></i>
                </button>
                <div class="profile-dropdown" id="profileDropdown">
                    <a href="#"><i class="fas fa-user"></i> Profil Saya</a>
                    <a href="pesanan-saya.html"><i class="fas fa-history"></i> Riwayat Pesanan</a>
                    <a href="#" class="logout-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</a>
                </div>
            </div>
            <div class="nav-toggle" id="navToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- ========== DETAIL ========== -->
    <div class="detail-container" id="detailContainer">

        <!-- KIRI -->
        <div class="detail-left">
            <a href="dashboard.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Kembali ke Beranda
            </a>

            <h1 class="destinasi-title" id="destinasiTitle">Memuat...</h1>
            <p class="destinasi-location" id="destinasiLocation">
                <i class="fas fa-map-marker-alt"></i>
            </p>
            <span class="destinasi-rating" id="destinasiRating">
                <i class="fas fa-star" style="color:#f9a825;"></i>
            </span>

            <button class="btn-favorit-detail" id="btnFavoritDetail" title="Tambah ke favorit">
                <i class="fas fa-heart"></i>
            </button>

            <div class="destinasi-image">
                <img id="destinasiImage" src="" alt="" />
            </div>

            <div class="destinasi-description">
                <h3>Detail Wisata</h3>
                <p id="destinasiDescription"></p>
            </div>

            <div class="fasilitas">
                <h3>Kategori</h3>
                <p id="destinasiKategori" style="font-size:15px;color:#444;"></p>
            </div>
        </div>

        <!-- KANAN: PESAN -->
        <div class="order-card">
            <div>
                <span class="price" id="destinasiHarga">Rp 0 <span>/ pax</span></span>
            </div>

            <hr class="divider" />

            <div class="form-group">
                <label for="tanggal">Pilih Jadwal Kedatangan</label>
                <input type="date" id="tanggal" />
            </div>

            <div class="form-group">
                <label for="jumlah">Jumlah Tiket / Orang</label>
                <div class="ticket-counter">
                    <button type="button" class="counter-btn minus" id="btnMinus" aria-label="Kurangi">
                        <i class="fas fa-minus"></i>
                    </button>
                    <input type="number" id="jumlah" value="1" min="1" max="20" readonly />
                    <button type="button" class="counter-btn plus" id="btnPlus" aria-label="Tambah">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>

            <hr class="divider" />

            <div class="total-section">
                <span class="label">Total Pembayaran</span>
                <span class="amount" id="totalAmount">Rp 0</span>
            </div>

            <button class="btn-payment" id="btnPayment">Lanjut ke Pembayaran</button>
            <p id="bookingFeedback" style="margin-top:12px;font-size:13px;text-align:center;"></p>
        </div>

    </div>

    <!-- ========== FOOTER ========== -->
    <footer class="footer">
        <p>&copy; 2026 Wonderloka. All rights reserved.</p>
    </footer>

    <!-- ========== JAVASCRIPT ========== -->
    <script src="../assets/js/script-api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ===== AUTH CHECK =====
            // Proteksi: Hanya wisatawan yang boleh akses
            function checkAuth() {
                const user = getUser();
                if (!user) {
                    window.location.href = '../halaman-login-user.html';
                    return null;
                }

                // Admin tidak boleh akses halaman wisatawan
                if (user.role === 'admin') {
                    window.location.href = '../superadmin/verifikasi-pengelola.html';
                    return null;
                }

                // Pengusaha tidak boleh akses halaman wisatawan
                if (user.role === 'pengusaha') {
                    if (user.status_verifikasi === 'terverifikasi') {
                        window.location.href = '../admin/index.html';
                    } else {
                        window.location.href = '../status-verifikasi.html';
                    }
                    return null;
                }

                if (user.role !== 'wisatawan') {
                    window.location.href = '../halaman-login-user.html';
                    return null;
                }

                return user;
            }
            const currentUser = checkAuth();
            if (!currentUser) return;

            // Profile dropdown
            const profileBtn = document.getElementById('profileBtn');
            const profileDropdown = document.getElementById('profileDropdown');
            if (profileBtn && profileDropdown) {
                profileBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    profileDropdown.classList.toggle('active');
                });
                document.addEventListener('click', function(e) {
                    if (!profileBtn.contains(e.target) && !profileDropdown.contains(e.target)) {
                        profileDropdown.classList.remove('active');
                    }
                });
            }

            // Mobile nav
            const navToggle = document.getElementById('navToggle');
            const navMenu = document.getElementById('navMenu');
            if (navToggle && navMenu) {
                navToggle.addEventListener('click', function() {
                    navMenu.classList.toggle('active');
                });
            }

            // Logout
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    clearAuth();
                    window.location.href = '../halaman-login-user.html';
                });
            }

            // Ambil ID dari URL
            const params = new URLSearchParams(window.location.search);
            const destinasiId = params.get('id');

            const jumlahInput = document.getElementById('jumlah');
            const totalAmount = document.getElementById('totalAmount');
            const hargaSpan = document.getElementById('destinasiHarga');
            const btnPayment = document.getElementById('btnPayment');
            const btnMinus = document.getElementById('btnMinus');
            const btnPlus = document.getElementById('btnPlus');
            const bookingFeedback = document.getElementById('bookingFeedback');
            let hargaPerPax = 0;

            // Muat detail destinasi
            async function loadDetail() {
                if (!destinasiId) {
                    document.getElementById('destinasiTitle').textContent = 'Destinasi tidak ditemukan';
                    return;
                }
                try {
                    const d = await apiFetch('/destinations/' + destinasiId);
                    document.getElementById('destinasiTitle').textContent = d.nama;
                    document.getElementById('destinasiLocation').innerHTML = '<i class="fas fa-map-marker-alt"></i> ' + d.lokasi;
                    document.getElementById('destinasiRating').innerHTML = '<i class="fas fa-star" style="color:#f9a825;"></i> ' + d.rating;
                    document.getElementById('destinasiImage').src = d.gambar;
                    document.getElementById('destinasiImage').alt = d.nama;
                    document.getElementById('destinasiDescription').textContent = d.deskripsi;
                    document.getElementById('destinasiKategori').innerHTML = '<i class="fas fa-tag"></i> ' + d.kategori;

                    hargaPerPax = d.harga;
                    hargaSpan.innerHTML = 'Rp ' + d.harga.toLocaleString('id-ID') + ' <span>/ pax</span>';
                    updateTotal();
                } catch (err) {
                    document.getElementById('destinasiTitle').textContent = 'Gagal memuat';
                    document.getElementById('destinasiDescription').textContent = err.message;
                }
            }

            function updateTotal() {
                let jumlah = parseInt(jumlahInput.value) || 1;
                if (jumlah < 1) jumlah = 1;
                if (jumlah > 20) jumlah = 20;
                jumlahInput.value = jumlah;
                const total = jumlah * hargaPerPax;
                totalAmount.textContent = 'Rp ' + total.toLocaleString('id-ID');
            }

            // Ticket counter buttons
            if (btnMinus) {
                btnMinus.addEventListener('click', function() {
                    let current = parseInt(jumlahInput.value) || 1;
                    if (current > 1) {
                        jumlahInput.value = current - 1;
                        updateTotal();
                    }
                });
            }

            if (btnPlus) {
                btnPlus.addEventListener('click', function() {
                    let current = parseInt(jumlahInput.value) || 1;
                    if (current < 20) {
                        jumlahInput.value = current + 1;
                        updateTotal();
                    }
                });
            }

            // Submit booking - redirect ke halaman pembayaran
            if (btnPayment) {
                btnPayment.addEventListener('click', function() {
                    const tanggal = document.getElementById('tanggal').value;
                    const jumlah = parseInt(jumlahInput.value) || 1;

                    if (!tanggal) {
                        bookingFeedback.style.color = '#c62828';
                        bookingFeedback.textContent = '⚠️ Pilih tanggal kedatangan terlebih dahulu.';
                        return;
                    }

                    if (!isLoggedIn()) {
                        if (confirm('Anda harus login terlebih dahulu. Ke halaman login?')) {
                            window.location.href = '../halaman-login-user.html';
                        }
                        return;
                    }

                    // Simpan data booking sementara ke sessionStorage
                    const bookingData = {
                        id_destinasi: parseInt(destinasiId),
                        nama_destinasi: document.getElementById('destinasiTitle').textContent,
                        lokasi: document.getElementById('destinasiLocation').textContent.replace('📍 ', ''),
                        gambar: document.getElementById('destinasiImage').src,
                        harga_per_tiket: hargaPerPax,
                        tgl_kunjungan: tanggal,
                        jumlah_tiket: jumlah,
                        total_harga: jumlah * hargaPerPax
                    };

                    sessionStorage.setItem('pending_booking', JSON.stringify(bookingData));

                    // Redirect ke halaman pembayaran
                    window.location.href = 'pembayaran.html';
                });
            }

            // Favorite toggle
            const btnFav = document.getElementById('btnFavoritDetail');

            async function checkFavorit() {
                if (!isLoggedIn() || !destinasiId) return;
                try {
                    const favs = await apiFetch('/favorites');
                    const isFav = favs.some(f => f.id_destinasi == destinasiId);
                    if (isFav) {
                        btnFav.classList.add('active');
                        btnFav.title = 'Hapus dari favorit';
                    }
                } catch (_) {}
            }

            if (btnFav) {
                btnFav.addEventListener('click', async function() {
                    if (!isLoggedIn()) {
                        if (confirm('Anda harus login terlebih dahulu. Ke halaman login?')) {
                            window.location.href = '../halaman-login-user.html';
                        }
                        return;
                    }
                    this.disabled = true;
                    try {
                        if (this.classList.contains('active')) {
                            const favs = await apiFetch('/favorites');
                            const fav = favs.find(f => f.id_destinasi == destinasiId);
                            if (fav) await apiFetch('/favorites/' + fav.id_favorit, { method: 'DELETE' });
                            this.classList.remove('active');
                            this.title = 'Tambah ke favorit';
                        } else {
                            await apiFetch('/favorites', {
                                method: 'POST',
                                body: JSON.stringify({ id_destinasi: parseInt(destinasiId) })
                            });
                            this.classList.add('active');
                            this.title = 'Hapus dari favorit';
                        }
                    } catch (err) {
                        alert('⚠️ ' + err.message);
                    }
                    this.disabled = false;
                });
            }

            // Nav menu links
            const navLinks = document.querySelectorAll('.nav-menu a');
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    if (this.getAttribute('href') === '#') {
                        e.preventDefault();
                        if (navMenu) navMenu.classList.remove('active');
                    }
                });
            });

            loadDetail();
            checkFavorit();
        });
    </script>

</body>
</html>
