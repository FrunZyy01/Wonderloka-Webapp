<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wonderloka - Kelola Destinasi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #e3f2fd;
            color: #1a1a1a;
        }
        a { text-decoration: none; color: inherit; }

        .navbar {
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(13, 71, 161, 0.08);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            color: #0d47a1;
        }
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 32px;
            font-weight: 500;
            font-size: 15px;
        }
        .nav-menu a {
            color: #555;
            transition: color 0.3s;
            padding: 6px 0;
            border-bottom: 3px solid transparent;
        }
        .nav-menu a:hover, .nav-menu a.active {
            color: #0d47a1;
            border-bottom-color: #0d47a1;
        }
        .nav-actions { display: flex; align-items: center; gap: 16px; position: relative; }
        .profile-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 28px;
            color: #555;
            transition: color 0.3s;
        }
        .profile-dropdown {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(13, 71, 161, 0.12);
            min-width: 180px;
            overflow: hidden;
            z-index: 200;
        }
        .profile-dropdown.active { display: block; }
        .profile-dropdown a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            font-size: 14px;
            color: #333;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }
        .profile-dropdown a:last-child { border-bottom: none; }
        .profile-dropdown a:hover { background: #e3f2fd; }
        .profile-dropdown a i { color: #0d47a1; width: 20px; }
        .profile-dropdown .logout-item { color: #d32f2f; }
        .profile-dropdown .logout-item i { color: #d32f2f; }

        .page-hero {
            background: linear-gradient(135deg, #0d47a1, #1565c0);
            padding: 40px 20px;
            text-align: center;
            color: #fff;
        }
        .page-hero h1 { font-size: 32px; font-weight: 700; }
        .page-hero p { font-size: 16px; opacity: 0.9; margin-top: 6px; }

        .table-section {
            max-width: 1200px;
            margin: 32px auto 60px;
            padding: 0 20px;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-header h2 { font-size: 22px; font-weight: 700; color: #1a1a1a; }
        .btn-tambah {
            background: #0d47a1;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }
        .btn-tambah:hover { background: #0a3d8a; }

        .table-wrapper {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(13, 71, 161, 0.06);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th {
            background: #e3f2fd;
            color: #0d47a1;
            text-align: left;
            padding: 14px 16px;
            font-weight: 600;
        }
        td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; color: #333; }
        tr:last-child td { border-bottom: none; }
        .btn-action {
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s;
            margin-right: 4px;
        }
        .btn-edit { background: #bbdefb; color: #0d47a1; }
        .btn-edit:hover { background: #0d47a1; color: #fff; }
        .btn-hapus { background: #ffcdd2; color: #c62828; }
        .btn-hapus:hover { background: #c62828; color: #fff; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 300;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff;
            border-radius: 20px;
            max-width: 540px;
            width: 100%;
            padding: 32px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal h2 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #333; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
            background: #fafafa;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #0d47a1;
            background: #fff;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
        .btn-simpan {
            flex: 1;
            padding: 12px;
            background: #0d47a1;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-simpan:hover { background: #0a3d8a; }
        .btn-batal-modal {
            flex: 1;
            padding: 12px;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-batal-modal:hover { background: #bdbdbd; }

        .footer { text-align: center; padding: 24px; font-size: 14px; color: #777; border-top: 1px solid #bbdefb; }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .page-hero h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-globe-asia"></i>
                <span>Wonderloka</span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="kelola-destinasi.html" class="active">Destinasi</a></li>
                <li><a href="kelola-pesanan.html">Pesanan</a></li>
            </ul>
            <div class="nav-actions">
                <button class="profile-btn" id="profileBtn"><i class="fas fa-user-circle"></i></button>
                <div class="profile-dropdown" id="profileDropdown">
                    <a href="profil-usaha.html"><i class="fas fa-store"></i> Profil</a>
                    <a href="#" class="logout-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <h1>Kelola Destinasi</h1>
        <p>Tambah, edit, atau hapus destinasi wisata Anda.</p>
    </section>

    <section class="table-section">
        <div class="section-header">
            <h2>Daftar Destinasi Saya</h2>
            <button class="btn-tambah" id="btnTambah"><i class="fas fa-plus"></i> Tambah</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Kategori</th>
                        <th>Lokasi</th>
                        <th>Harga</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="destinasiBody"></tbody>
            </table>
        </div>
    </section>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Tambah Destinasi</h2>
            <form id="destinasiForm">
                <input type="hidden" id="editId" value="" />
                <div class="form-group">
                    <label for="nama">Nama Destinasi</label>
                    <input type="text" id="nama" required />
                </div>
                <div class="form-group">
                    <label for="kategori">Kategori</label>
                    <select id="kategori">
                        <option value="Alam">Alam</option>
                        <option value="Budaya">Budaya</option>
                        <option value="Kuliner">Kuliner</option>
                        <option value="Penginapan">Penginapan</option>
                        <option value="Tour">Tour</option>
                        <option value="Campground">Campground</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="lokasi">Lokasi</label>
                    <input type="text" id="lokasi" />
                </div>
                <div class="form-group">
                    <label for="harga">Harga (Rp)</label>
                    <input type="number" id="harga" min="0" />
                </div>
                <div class="form-group">
                    <label for="gambar">URL Gambar</label>
                    <input type="url" id="gambar" placeholder="https://..." />
                </div>
                <div class="form-group">
                    <label for="deskripsi">Deskripsi</label>
                    <textarea id="deskripsi"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-batal-modal" id="btnBatalModal">Batal</button>
                    <button type="submit" class="btn-simpan">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer"><p>&copy; 2026 Wonderloka. All rights reserved.</p></footer>

    <script src="../assets/js/script-api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Auth check
            const user = getUser();
            if (!user || user.role !== 'pengusaha') {
                clearAuth();
                window.location.href = '../halaman-login-user.html';
                return;
            }

            // Profile dropdown
            const profileBtn = document.getElementById('profileBtn');
            const profileDropdown = document.getElementById('profileDropdown');
            profileBtn.addEventListener('click', function(e) { e.stopPropagation(); profileDropdown.classList.toggle('active'); });
            document.addEventListener('click', function(e) {
                if (!profileBtn.contains(e.target) && !profileDropdown.contains(e.target)) {
                    profileDropdown.classList.remove('active');
                }
            });

            // Logout
            document.getElementById('logoutBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('Yakin keluar?')) {
                    clearAuth();
                    window.location.href = '../halaman-login-user.html';
                }
            });

            const tbody = document.getElementById('destinasiBody');
            const modalOverlay = document.getElementById('modalOverlay');
            const destinasiForm = document.getElementById('destinasiForm');

            function openModal(data) {
                document.getElementById('modalTitle').textContent = data ? 'Edit Destinasi' : 'Tambah Destinasi';
                document.getElementById('editId').value = data ? data.id_destinasi : '';
                document.getElementById('nama').value = data ? data.nama : '';
                document.getElementById('kategori').value = data ? data.kategori : 'Alam';
                document.getElementById('lokasi').value = data ? data.lokasi : '';
                document.getElementById('harga').value = data ? data.harga : 0;
                document.getElementById('gambar').value = data ? data.gambar : '';
                document.getElementById('deskripsi').value = data ? data.deskripsi : '';
                modalOverlay.classList.add('active');
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                destinasiForm.reset();
            }

            document.getElementById('btnTambah').addEventListener('click', () => openModal(null));
            document.getElementById('btnBatalModal').addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', function(e) { if (e.target === modalOverlay) closeModal(); });

            async function loadDestinasi() {
                try {
                    const data = await apiFetch('/pengelola/destinations');
                    if (!data.length) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#94a3b8;">Belum ada destinasi</td></tr>';
                        return;
                    }
                    let html = '';
                    data.forEach((d, i) => {
                        html += '<tr><td>' + (i+1) + '</td><td>' + d.nama + '</td><td>' + d.kategori + '</td><td>' + (d.lokasi || '-') + '</td><td>Rp ' + Number(d.harga || 0).toLocaleString('id-ID') + '</td><td><button class="btn-action btn-edit" data-id="' + d.id_destinasi + '"><i class="fas fa-edit"></i></button> <button class="btn-action btn-hapus" data-id="' + d.id_destinasi + '"><i class="fas fa-trash"></i></button></td></tr>';
                    });
                    tbody.innerHTML = html;

                    tbody.querySelectorAll('.btn-edit').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const id = this.dataset.id;
                            openModal(data.find(d => d.id_destinasi == id));
                        });
                    });

                    tbody.querySelectorAll('.btn-hapus').forEach(btn => {
                        btn.addEventListener('click', async function() {
                            const id = this.dataset.id;
                            if (!confirm('Yakin hapus?')) return;
                            try {
                                await apiFetch('/pengelola/destinations/' + id, { method: 'DELETE' });
                                loadDestinasi();
                            } catch (err) { alert(err.message); }
                        });
                    });
                } catch (err) {
                    tbody.innerHTML = '<tr><td colspan="6" style="color:red;">Gagal memuat</td></tr>';
                }
            }

            destinasiForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const id = document.getElementById('editId').value;
                const payload = {
                    nama: document.getElementById('nama').value.trim(),
                    kategori: document.getElementById('kategori').value,
                    lokasi: document.getElementById('lokasi').value.trim(),
                    harga: parseInt(document.getElementById('harga').value) || 0,
                    gambar: document.getElementById('gambar').value.trim(),
                    deskripsi: document.getElementById('deskripsi').value.trim()
                };
                try {
                    if (id) {
                        await apiFetch('/pengelola/destinations/' + id, { method: 'PUT', body: JSON.stringify(payload) });
                    } else {
                        await apiFetch('/pengelola/destinations', { method: 'POST', body: JSON.stringify(payload) });
                    }
                    closeModal();
                    loadDestinasi();
                } catch (err) { alert(err.message); }
            });

            loadDestinasi();
        });
    </script>
</body>
</html>
